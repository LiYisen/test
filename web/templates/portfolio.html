<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组合分析 - 期货回测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
            padding: 20px 0;
            margin-bottom: 20px;
        }
        header .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 1.5em;
            font-weight: 500;
            color: #fff;
        }
        header p {
            color: #8892b0;
            font-size: 0.9em;
        }
        .nav-links a {
            color: #8892b0;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid #3a3a5a;
            border-radius: 4px;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .nav-links a:hover {
            background: #1f2940;
            color: #fff;
            border-color: #4a4a6a;
        }
        .card {
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: 500;
            border-bottom: 1px solid #2a2a4a;
            padding-bottom: 12px;
        }
        .btn {
            background: #1f2940;
            color: #e0e0e0;
            border: 1px solid #3a3a5a;
            padding: 12px 32px;
            font-size: 0.95em;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 400;
        }
        .btn:hover {
            background: #2a3a5a;
            border-color: #4a4a7a;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            padding: 8px 16px;
            font-size: 0.85em;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            padding: 16px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 1.5em;
            font-weight: 500;
            margin-bottom: 4px;
            color: #fff;
        }
        .stat-card .label {
            color: #8892b0;
            font-size: 0.8em;
        }
        .stat-card.positive .value {
            color: #64ffda;
        }
        .stat-card.negative .value {
            color: #ff6b6b;
        }
        .chart-container {
            position: relative;
            height: 350px;
            margin: 16px 0;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid #3a3a5a;
            border-top-color: #8892b0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: #2a1a1a;
            border: 1px solid #4a2a2a;
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 0.9em;
        }
        .success {
            background: #1a2a1a;
            border: 1px solid #2a4a2a;
            color: #64ffda;
            padding: 12px 16px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 0.9em;
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-bottom: 1px solid #2a2a4a;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-weight: 400;
            color: #8892b0;
            font-size: 0.9em;
        }
        .tab.active {
            color: #fff;
            border-bottom-color: #64ffda;
        }
        .tab:hover {
            color: #b0b0d0;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .hidden {
            display: none !important;
        }
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            max-height: 350px;
            overflow-y: auto;
            padding: 8px;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
        }
        .selection-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #1a1a2e;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #2a2a4a;
            transition: all 0.15s;
        }
        .selection-item:hover {
            border-color: #3a3a5a;
        }
        .selection-item.selected {
            border-color: #64ffda;
            background: #1a2a2a;
        }
        .selection-item input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            accent-color: #64ffda;
        }
        .selection-item .info {
            flex: 1;
        }
        .selection-item .title {
            font-weight: 400;
            color: #e0e0e0;
            font-size: 0.95em;
        }
        .selection-item .meta {
            font-size: 0.8em;
            color: #6a6a8a;
            margin-top: 2px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6a6a8a;
        }
        .empty-state a {
            color: #8892b0;
        }
        .selected-count {
            background: #1f2940;
            color: #e0e0e0;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 0.85em;
            margin-left: 10px;
            border: 1px solid #3a3a5a;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a5a;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a6a;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1>组合分析</h1>
                <p>选择多个同时段的回测结果，生成组合收益和风险分析</p>
            </div>
            <div class="nav-links">
                <a href="/">回测主页</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2>选择回测结果 <span class="selected-count" id="selectedCount">0</span></h2>
            <p style="color: #6a6a8a; margin-bottom: 12px; font-size: 0.9em;">请选择至少2个时间区间有重叠的回测结果进行组合分析</p>
            <div id="resultsList" class="selection-grid"></div>
            <div style="margin-top: 16px;">
                <button class="btn" onclick="analyzePortfolio()" id="analyzeBtn">生成组合分析</button>
                <button class="btn btn-secondary" onclick="clearSelection()">清空选择</button>
            </div>
            <div id="message"></div>
        </div>

        <div class="card hidden" id="statsCard">
            <h2>组合统计指标</h2>
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <div class="card hidden" id="chartsCard">
            <h2>组合图表</h2>
            <div class="tabs">
                <div class="tab active" data-tab="equity">组合资金曲线与回撤</div>
                <div class="tab" data-tab="daily">组合日收益</div>
                <div class="tab" data-tab="components">各品种对比</div>
            </div>
            <div class="tab-content active" id="tab-equity">
                <div class="chart-container">
                    <canvas id="equityChart"></canvas>
                </div>
            </div>
            <div class="tab-content" id="tab-daily">
                <div class="chart-container">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>
            <div class="tab-content" id="tab-components">
                <div class="chart-container">
                    <canvas id="componentsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let charts = {};
        let selectedIds = new Set();
        let resultsData = [];

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        async function loadResults() {
            try {
                const response = await fetch('/api/results');
                const data = await response.json();
                resultsData = data.results || [];
                renderResults();
            } catch (err) {
                document.getElementById('resultsList').innerHTML = 
                    '<div class="error">加载失败: ' + err.message + '</div>';
            }
        }

        function renderResults() {
            const list = document.getElementById('resultsList');
            
            if (resultsData.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无回测结果，请先<a href="/">运行回测</a></div>';
                return;
            }

            list.innerHTML = resultsData.map(r => {
                const parts = r.id.split('_');
                const symbol = parts[0] || '';
                const strategy = parts[1] || '';
                const startDate = parts[2] || '';
                const endDate = parts[3] || '';
                const leverage = parts[4] || '';
                
                return `
                    <div class="selection-item ${selectedIds.has(r.id) ? 'selected' : ''}" onclick="toggleSelection('${r.id}')">
                        <input type="checkbox" ${selectedIds.has(r.id) ? 'checked' : ''} onclick="event.stopPropagation()">
                        <div class="info">
                            <div class="title">${symbol} <span style="color: #8892b0;">(${strategy})</span></div>
                            <div class="meta">${startDate} ~ ${endDate} | 杠杆: ${leverage}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            updateSelectedCount();
        }

        function toggleSelection(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            renderResults();
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedIds.size;
        }

        function clearSelection() {
            selectedIds.clear();
            renderResults();
            document.getElementById('statsCard').classList.add('hidden');
            document.getElementById('chartsCard').classList.add('hidden');
            document.getElementById('message').innerHTML = '';
        }

        async function analyzePortfolio() {
            const ids = Array.from(selectedIds);
            const msg = document.getElementById('message');
            const btn = document.getElementById('analyzeBtn');
            
            if (ids.length < 2) {
                msg.innerHTML = '<div class="error">请至少选择2个回测结果</div>';
                return;
            }
            
            btn.disabled = true;
            msg.innerHTML = '<div class="loading">正在计算组合分析...</div>';
            
            try {
                const response = await fetch('/api/portfolio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: ids })
                });
                
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || '组合分析失败');
                }
                
                msg.innerHTML = '<div class="success">组合分析完成！品种: ' + result.symbols.join(', ') + 
                    ' | 共同时间段: ' + result.common_start + ' ~ ' + result.common_end + '</div>';
                
                displayStats(result.statistics);
                drawEquityChart(result.daily_records);
                drawDailyChart(result.daily_records);
                drawComponentsChart(result.daily_records);
                
                document.getElementById('statsCard').classList.remove('hidden');
                document.getElementById('chartsCard').classList.remove('hidden');
            } catch (err) {
                msg.innerHTML = '<div class="error">错误: ' + err.message + '</div>';
            } finally {
                btn.disabled = false;
            }
        }

        function displayStats(stats) {
            const grid = document.getElementById('statsGrid');
            const totalReturn = parseFloat(stats.total_return);
            const annualReturn = parseFloat(stats.annual_return);
            
            grid.innerHTML = `
                <div class="stat-card ${totalReturn >= 0 ? 'positive' : 'negative'}">
                    <div class="value">${(totalReturn * 100).toFixed(2)}%</div>
                    <div class="label">组合总收益率</div>
                </div>
                <div class="stat-card ${annualReturn >= 0 ? 'positive' : 'negative'}">
                    <div class="value">${(annualReturn * 100).toFixed(2)}%</div>
                    <div class="label">组合年化收益率</div>
                </div>
                <div class="stat-card">
                    <div class="value">${(parseFloat(stats.max_drawdown_ratio) * 100).toFixed(2)}%</div>
                    <div class="label">组合最大回撤</div>
                </div>
                <div class="stat-card">
                    <div class="value">${parseFloat(stats.sharpe_ratio).toFixed(2)}</div>
                    <div class="label">组合夏普比率</div>
                </div>
                <div class="stat-card">
                    <div class="value">${parseFloat(stats.calmar_ratio).toFixed(2)}</div>
                    <div class="label">组合卡玛比率</div>
                </div>
                <div class="stat-card">
                    <div class="value">${stats.trading_days}</div>
                    <div class="label">交易天数</div>
                </div>
                <div class="stat-card">
                    <div class="value">${stats.total_trades}</div>
                    <div class="label">总交易次数</div>
                </div>
                <div class="stat-card">
                    <div class="value">${(parseFloat(stats.win_rate) * 100).toFixed(2)}%</div>
                    <div class="label">胜率</div>
                </div>
            `;
        }

        function drawEquityChart(records) {
            const ctx = document.getElementById('equityChart').getContext('2d');
            if (charts.equity) charts.equity.destroy();
            
            let peak = 1;
            const drawdowns = records.map(r => {
                const val = parseFloat(r.total_value);
                if (val > peak) peak = val;
                return (peak - val) / peak;
            });
            
            charts.equity = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: records.map(r => r.date),
                    datasets: [
                        {
                            label: '组合净值',
                            data: records.map(r => parseFloat(r.total_value)),
                            borderColor: '#64ffda',
                            backgroundColor: 'rgba(100, 255, 218, 0.05)',
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0,
                            borderWidth: 1.5,
                            yAxisID: 'y'
                        },
                        {
                            label: '回撤',
                            data: drawdowns,
                            borderColor: '#ff6b6b',
                            backgroundColor: 'rgba(255, 107, 107, 0.05)',
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0,
                            borderWidth: 1.5,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#8892b0',
                                usePointStyle: true,
                                padding: 15
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    if (ctx.dataset.label === '回撤') {
                                        return '回撤: ' + (ctx.parsed.y * 100).toFixed(2) + '%';
                                    } else {
                                        return '净值: ' + ctx.parsed.y.toFixed(4);
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#2a2a4a' },
                            ticks: { color: '#8892b0', maxTicksLimit: 10 }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            grid: { color: '#2a2a4a' },
                            ticks: { color: '#64ffda' },
                            title: {
                                display: true,
                                text: '净值',
                                color: '#64ffda'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            grid: {
                                drawOnChartArea: false,
                            },
                            ticks: {
                                color: '#ff6b6b',
                                callback: (v) => (v * 100).toFixed(1) + '%'
                            },
                            title: {
                                display: true,
                                text: '回撤',
                                color: '#ff6b6b'
                            }
                        }
                    }
                }
            });
        }

        function drawDailyChart(records) {
            const ctx = document.getElementById('dailyChart').getContext('2d');
            if (charts.daily) charts.daily.destroy();
            
            const returns = records.map(r => parseFloat(r.daily_return));
            const colors = returns.map(r => r >= 0 ? '#1a3a2a' : '#3a1a1a');
            
            charts.daily = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: records.map(r => r.date),
                    datasets: [{
                        label: '日收益率',
                        data: returns.map(r => r * 100),
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: (ctx) => '日收益: ' + ctx.parsed.y.toFixed(2) + '%' } }
                    },
                    scales: {
                        x: {
                            grid: { color: '#2a2a4a' },
                            ticks: { color: '#8892b0', maxTicksLimit: 10 }
                        },
                        y: {
                            grid: { color: '#2a2a4a' },
                            ticks: { color: '#8892b0', callback: (v) => v.toFixed(1) + '%' }
                        }
                    }
                }
            });
        }

        function drawComponentsChart(records) {
            const ctx = document.getElementById('componentsChart').getContext('2d');
            if (charts.components) charts.components.destroy();
            
            const symbols = [...new Set(records.flatMap(r => Object.keys(r.components || {})))];
            const colors = ['#64ffda', '#ff6b6b', '#60a5fa', '#fbbf24', '#a78bfa', '#f472b6', '#34d399', '#fb923c'];
            
            charts.components = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: records.map(r => r.date),
                    datasets: symbols.map((sym, i) => ({
                        label: sym,
                        data: records.map(r => r.components && r.components[sym] ? parseFloat(r.components[sym]) : null),
                        borderColor: colors[i % colors.length],
                        backgroundColor: 'transparent',
                        tension: 0.1,
                        pointRadius: 0,
                        borderWidth: 1.5
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: { color: '#8892b0', boxWidth: 12, padding: 15 }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#2a2a4a' },
                            ticks: { color: '#8892b0', maxTicksLimit: 10 }
                        },
                        y: {
                            grid: { color: '#2a2a4a' },
                            ticks: { color: '#8892b0' }
                        }
                    }
                }
            });
        }

        loadResults();
    </script>
</body>
</html>
