<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期货回测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
            padding: 20px 0;
            margin-bottom: 20px;
        }
        header .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 1.5em;
            font-weight: 500;
            color: #fff;
        }
        header p {
            color: #8892b0;
            font-size: 0.9em;
        }
        .nav-links a {
            color: #8892b0;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid #3a3a5a;
            border-radius: 4px;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .nav-links a:hover {
            background: #1f2940;
            color: #fff;
            border-color: #4a4a6a;
        }
        .card {
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: 500;
            border-bottom: 1px solid #2a2a4a;
            padding-bottom: 12px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: 400;
            margin-bottom: 6px;
            color: #8892b0;
            font-size: 0.9em;
        }
        .form-group input, .form-group select {
            padding: 10px 12px;
            border: 1px solid #3a3a5a;
            border-radius: 4px;
            font-size: 0.95em;
            background: #1a1a2e;
            color: #e0e0e0;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #5a5a8a;
        }
        .form-group input::placeholder {
            color: #6a6a8a;
        }
        .form-group small {
            color: #6a6a8a;
            font-size: 0.8em;
            margin-top: 4px;
        }
        .btn {
            background: #1f2940;
            color: #e0e0e0;
            border: 1px solid #3a3a5a;
            padding: 12px 32px;
            font-size: 0.95em;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 400;
        }
        .btn:hover {
            background: #2a3a5a;
            border-color: #4a4a7a;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            padding: 8px 16px;
            font-size: 0.85em;
        }
        .btn-danger {
            border-color: #5a2a2a;
            color: #f05050;
        }
        .btn-danger:hover {
            background: #3a1a1a;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            padding: 16px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 1.6em;
            font-weight: 500;
            margin-bottom: 4px;
            color: #fff;
        }
        .stat-card .label {
            color: #8892b0;
            font-size: 0.85em;
        }
        .stat-card.positive .value {
            color: #64ffda;
        }
        .stat-card.negative .value {
            color: #ff6b6b;
        }
        .chart-container {
            position: relative;
            height: 350px;
            margin: 16px 0;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid #3a3a5a;
            border-top-color: #8892b0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: #2a1a1a;
            border: 1px solid #4a2a2a;
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 0.9em;
        }
        .success {
            background: #1a2a1a;
            border: 1px solid #2a4a2a;
            color: #64ffda;
            padding: 12px 16px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 0.9em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
            font-size: 0.9em;
        }
        th {
            background: #1a1a2e;
            font-weight: 500;
            color: #8892b0;
        }
        tr:hover {
            background: #1f2940;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .badge-buy {
            background: #1a3a2a;
            color: #64ffda;
        }
        .badge-sell {
            background: #3a1a1a;
            color: #ff6b6b;
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-bottom: 1px solid #2a2a4a;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-weight: 400;
            color: #8892b0;
            font-size: 0.9em;
        }
        .tab.active {
            color: #fff;
            border-bottom-color: #64ffda;
        }
        .tab:hover {
            color: #b0b0d0;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .hidden {
            display: none !important;
        }
        #resultsList {
            max-height: 350px;
            overflow-y: auto;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .result-item:hover {
            border-color: #3a3a5a;
        }
        .result-info {
            flex: 1;
        }
        .result-title {
            font-weight: 400;
            color: #e0e0e0;
            font-size: 0.95em;
        }
        .result-meta {
            font-size: 0.8em;
            color: #6a6a8a;
            margin-top: 2px;
        }
        .result-actions {
            display: flex;
            gap: 6px;
        }
        .result-actions button {
            padding: 5px 10px;
            font-size: 0.8em;
        }
        .search-select-wrapper {
            position: relative;
        }
        .search-select-input {
            padding: 10px 12px;
            border: 1px solid #3a3a5a;
            border-radius: 4px;
            font-size: 0.95em;
            width: 100%;
            cursor: pointer;
            background: #1a1a2e;
            color: #e0e0e0;
            transition: border-color 0.2s;
        }
        .search-select-input:focus {
            outline: none;
            border-color: #5a5a8a;
        }
        .search-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #16213e;
            border: 1px solid #3a3a5a;
            max-height: 280px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            border-radius: 0 0 4px 4px;
        }
        .search-select-dropdown.show {
            display: block;
        }
        .search-select-option {
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.9em;
        }
        .search-select-option:hover {
            background: #1f2940;
        }
        .search-select-option.selected {
            background: #1f2940;
        }
        .search-select-option .code {
            font-weight: 500;
            color: #e0e0e0;
        }
        .search-select-option .name {
            color: #8892b0;
            margin-left: 8px;
        }
        .search-select-option .exchange {
            color: #6a6a8a;
            font-size: 0.85em;
            margin-left: 8px;
        }
        .search-select-empty {
            padding: 12px;
            text-align: center;
            color: #6a6a8a;
            font-size: 0.9em;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a5a;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a6a;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1>期货回测系统</h1>
                <p>策略回测平台</p>
            </div>
            <div class="nav-links">
                <a href="/portfolio">组合分析</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2>新建回测任务</h2>
            <form id="backtestForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="symbolSearch">品种</label>
                        <div class="search-select-wrapper">
                            <input type="text" id="symbolSearch" class="search-select-input" 
                                   placeholder="输入品种代码/名称搜索..." autocomplete="off">
                            <input type="hidden" id="symbol" name="symbol">
                            <div class="search-select-dropdown" id="symbolDropdown"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="startDate">开始日期</label>
                        <input type="date" id="startDate" name="startDate" required>
                    </div>
                    <div class="form-group">
                        <label for="endDate">结束日期</label>
                        <input type="date" id="endDate" name="endDate" required>
                    </div>
                    <div class="form-group">
                        <label for="strategy">策略</label>
                        <select id="strategy" name="strategy">
                        </select>
                    </div>
                    <div id="strategyParams"></div>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <button type="submit" class="btn" id="runBtn">运行回测</button>
                </div>
            </form>
            <div id="message"></div>
        </div>

        <div class="card hidden" id="statsCard">
            <h2>回测结果统计</h2>
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <div class="card hidden" id="chartsCard">
            <h2>图表分析</h2>
            <div class="tabs">
                <div class="tab active" data-tab="equity">资金曲线与回撤</div>
                <div class="tab" data-tab="daily">日收益</div>
            </div>
            <div class="tab-content active" id="tab-equity">
                <div class="chart-container">
                    <canvas id="equityChart"></canvas>
                </div>
            </div>
            <div class="tab-content" id="tab-daily">
                <div class="chart-container">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card hidden" id="tradesCard">
            <h2>交易记录</h2>
            <div style="overflow-x: auto;">
                <table id="tradesTable">
                    <thead>
                        <tr>
                            <th>开仓日期</th>
                            <th>平仓日期</th>
                            <th>合约</th>
                            <th>方向</th>
                            <th>开仓价</th>
                            <th>平仓价</th>
                            <th>杠杆</th>
                            <th>收益率</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>历史回测结果</h2>
            <button class="btn btn-secondary" onclick="loadResults()">刷新列表</button>
            <div id="resultsList" style="margin-top: 12px;"></div>
        </div>
    </div>

    <script>
        let currentResultId = null;
        let charts = {};
        let allSymbols = [];
        let selectedSymbol = null;
        
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }
        
        function validateDates(startDate, endDate) {
            if (!startDate || !endDate) {
                return { valid: false, error: '请选择开始和结束日期' };
            }
            
            const start = new Date(startDate);
            const end = new Date(endDate);
            
            if (isNaN(start.getTime()) || isNaN(end.getTime())) {
                return { valid: false, error: '日期格式无效' };
            }
            
            if (start >= end) {
                return { valid: false, error: '开始日期必须早于结束日期' };
            }
            
            const today = new Date();
            today.setHours(23, 59, 59, 999);
            if (end > today) {
                return { valid: false, error: '结束日期不能晚于今天' };
            }
            
            const maxRange = 10 * 365 * 24 * 60 * 60 * 1000;
            if (end - start > maxRange) {
                return { valid: false, error: '日期范围不能超过10年' };
            }
            
            return { valid: true };
        }
        
        function validateParams(strategy, params) {
            const strategyConfig = window.strategiesConfig && window.strategiesConfig.find(s => s.name === strategy);
            if (!strategyConfig || !strategyConfig.params) {
                return { valid: true, params: params };
            }
            
            const errors = [];
            const validatedParams = {};
            
            strategyConfig.params.forEach(p => {
                const input = document.getElementById('param_' + p.name);
                if (!input) return;
                
                const value = parseFloat(input.value);
                
                if (isNaN(value)) {
                    errors.push(`${p.display_name}必须是数字`);
                    return;
                }
                
                if (p.min !== undefined && value < p.min) {
                    errors.push(`${p.display_name}不能小于${p.min}`);
                    return;
                }
                
                if (p.max !== undefined && value > p.max) {
                    errors.push(`${p.display_name}不能大于${p.max}`);
                    return;
                }
                
                validatedParams[p.name] = value;
            });
            
            return {
                valid: errors.length === 0,
                errors: errors,
                params: validatedParams
            };
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        async function loadSymbols() {
            try {
                const response = await fetch('/api/symbols');
                const data = await response.json();
                allSymbols = data.symbols || [];
                renderSymbolDropdown(allSymbols);
            } catch (err) {
                console.error('加载品种列表失败:', err);
            }
        }

        async function loadStrategies() {
            try {
                const response = await fetch('/api/strategies');
                const data = await response.json();
                const strategies = data.strategies || [];
                const select = document.getElementById('strategy');
                select.innerHTML = strategies.map(s => 
                    `<option value="${s.name}">${s.display_name}</option>`
                ).join('');
                
                window.strategiesConfig = strategies;
                
                select.addEventListener('change', updateStrategyParams);
                
                updateStrategyParams();
            } catch (err) {
                console.error('加载策略列表失败:', err);
            }
        }

        function updateStrategyParams() {
            const strategyName = document.getElementById('strategy').value;
            const paramsContainer = document.getElementById('strategyParams');
            
            if (!window.strategiesConfig) {
                return;
            }
            
            const strategy = window.strategiesConfig.find(s => s.name === strategyName);
            if (!strategy || !strategy.params || strategy.params.length === 0) {
                paramsContainer.innerHTML = '';
                return;
            }
            
            const paramsHtml = strategy.params.map(param => {
                if (param.type === 'int') {
                    return `
                        <div class="form-group">
                            <label for="param_${param.name}">${param.display_name}</label>
                            <input type="number" id="param_${param.name}" name="${param.name}" 
                                   value="${param.default}" min="${param.min}" max="${param.max}" step="1">
                            <small>${param.description}</small>
                        </div>
                    `;
                } else {
                    return `
                        <div class="form-group">
                            <label for="param_${param.name}">${param.display_name}</label>
                            <input type="number" id="param_${param.name}" name="${param.name}" 
                                   value="${param.default}" min="${param.min}" max="${param.max}" step="0.1">
                            <small>${param.description}</small>
                        </div>
                    `;
                }
            }).join('');
            
            paramsContainer.innerHTML = paramsHtml;
        }

        function renderSymbolDropdown(symbols) {
            const dropdown = document.getElementById('symbolDropdown');
            
            if (symbols.length === 0) {
                dropdown.innerHTML = '<div class="search-select-empty">未找到匹配的品种</div>';
                return;
            }
            
            dropdown.innerHTML = symbols.map(s => `
                <div class="search-select-option ${selectedSymbol && selectedSymbol.code === s.code ? 'selected' : ''}" 
                     data-code="${s.code}" data-name="${s.name}" data-exchange="${s.exchange}">
                    <span class="code">${s.code}</span>
                    <span class="name">${s.name}</span>
                    <span class="exchange">(${s.exchange})</span>
                </div>
            `).join('');
            
            dropdown.querySelectorAll('.search-select-option').forEach(opt => {
                opt.addEventListener('click', () => selectSymbol(opt));
            });
        }

        function selectSymbol(opt) {
            selectedSymbol = {
                code: opt.dataset.code,
                name: opt.dataset.name,
                exchange: opt.dataset.exchange
            };
            
            document.getElementById('symbolSearch').value = `${selectedSymbol.code} - ${selectedSymbol.name}`;
            document.getElementById('symbol').value = selectedSymbol.code;
            
            document.getElementById('symbolDropdown').classList.remove('show');
            
            renderSymbolDropdown(allSymbols);
        }

        function searchSymbols(query) {
            if (!query) return allSymbols;
            
            query = query.toLowerCase();
            return allSymbols.filter(s => 
                s.code.toLowerCase().includes(query) ||
                s.name.includes(query) ||
                (s.pinyin && s.pinyin.toLowerCase().includes(query))
            );
        }

        const symbolSearch = document.getElementById('symbolSearch');
        const symbolDropdown = document.getElementById('symbolDropdown');

        symbolSearch.addEventListener('focus', () => {
            symbolDropdown.classList.add('show');
            renderSymbolDropdown(allSymbols);
        });

        symbolSearch.addEventListener('input', (e) => {
            const filtered = searchSymbols(e.target.value);
            symbolDropdown.classList.add('show');
            renderSymbolDropdown(filtered);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-select-wrapper')) {
                symbolDropdown.classList.remove('show');
            }
        });

        async function loadResults() {
            try {
                const response = await fetch('/api/results');
                const data = await response.json();
                const results = data.results || [];
                renderResults(results);
            } catch (err) {
                console.error('加载结果列表失败:', err);
            }
        }

        function renderResults(results) {
            const container = document.getElementById('resultsList');
            
            if (!results || results.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #6a6a8a; padding: 20px;">暂无回测结果</div>';
                return;
            }
            
            container.innerHTML = results.map(r => {
                const parts = r.id.split('_');
                const symbol = parts[0] || '';
                const strategy = parts[1] || '';
                const startDate = parts[2] || '';
                const endDate = parts[3] || '';
                const leverage = parts[4] || '';
                
                return `
                    <div class="result-item">
                        <div class="result-info">
                            <div class="result-title">${escapeHtml(symbol)} - ${escapeHtml(strategy)}</div>
                            <div class="result-meta">${escapeHtml(startDate)} ~ ${escapeHtml(endDate)} | 杠杆: ${escapeHtml(leverage)}</div>
                        </div>
                        <div class="result-actions">
                            <button class="btn btn-secondary" onclick="viewResult('${escapeHtml(r.id)}')">查看</button>
                            <button class="btn btn-danger" onclick="deleteResult('${escapeHtml(r.id)}')">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function viewResult(id) {
            currentResultId = id;
            
            try {
                const [summaryRes, dailyRes, tradesRes] = await Promise.all([
                    fetch(`/api/results/${id}`),
                    fetch(`/api/results/${id}/data?type=daily`),
                    fetch(`/api/results/${id}/data?type=returns`)
                ]);
                
                const summary = await summaryRes.json();
                const dailyData = await dailyRes.json();
                const tradesData = await tradesRes.json();
                
                const daily = dailyData.daily_records || [];
                const trades = tradesData.position_returns || [];
                
                renderStats(summary);
                renderCharts(daily);
                renderTrades(trades);
                
                document.getElementById('statsCard').classList.remove('hidden');
                document.getElementById('chartsCard').classList.remove('hidden');
                document.getElementById('tradesCard').classList.remove('hidden');
                
                document.getElementById('statsCard').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                console.error('加载结果失败:', err);
                showMessage('加载结果失败: ' + err.message, 'error');
            }
        }

        async function deleteResult(id) {
            if (!confirm('确定要删除这个结果吗？')) return;
            
            try {
                await fetch(`/api/results/${id}`, { method: 'DELETE' });
                loadResults();
                showMessage('删除成功', 'success');
            } catch (err) {
                showMessage('删除失败: ' + err.message, 'error');
            }
        }

        function renderStats(summary) {
            const grid = document.getElementById('statsGrid');
            
            const stats = summary.statistics || summary;
            
            const totalReturn = parseFloat(stats.total_return) || 0;
            const annualReturn = parseFloat(stats.annual_return) || 0;
            const maxDrawdown = parseFloat(stats.max_drawdown) || 0;
            const sharpeRatio = parseFloat(stats.sharpe_ratio) || 0;
            const winRate = parseFloat(stats.win_rate) || 0;
            
            const displayStats = [
                { label: '总收益率', value: formatPercent(totalReturn), positive: totalReturn > 0 },
                { label: '年化收益', value: formatPercent(annualReturn), positive: annualReturn > 0 },
                { label: '最大回撤', value: formatPercent(maxDrawdown), positive: false },
                { label: '夏普比率', value: sharpeRatio.toFixed(2), positive: sharpeRatio > 0 },
                { label: '胜率', value: formatPercent(winRate), positive: winRate > 0.5 },
                { label: '交易次数', value: stats.total_trades || '-' }
            ];
            
            grid.innerHTML = displayStats.map(s => `
                <div class="stat-card ${s.positive ? 'positive' : ''}">
                    <div class="value">${escapeHtml(s.value)}</div>
                    <div class="label">${escapeHtml(s.label)}</div>
                </div>
            `).join('');
        }

        function renderCharts(daily) {
            if (!daily || daily.length === 0) return;
            
            const dates = daily.map(d => d.date);
            const equity = daily.map(d => d.total_value);
            const drawdown = daily.map(d => (d.drawdown || 0) * 100);
            const dailyReturn = daily.map(d => (d.daily_return || 0) * 100);
            
            if (charts.equity) charts.equity.destroy();
            if (charts.daily) charts.daily.destroy();
            
            charts.equity = new Chart(document.getElementById('equityChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: '资金曲线',
                            data: equity,
                            borderColor: '#64ffda',
                            backgroundColor: 'rgba(100, 255, 218, 0.1)',
                            borderWidth: 1.5,
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0,
                            yAxisID: 'y'
                        },
                        {
                            label: '回撤',
                            data: drawdown,
                            borderColor: '#ff6b6b',
                            backgroundColor: 'rgba(255, 107, 107, 0.1)',
                            borderWidth: 1.5,
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#8892b0',
                                usePointStyle: true,
                                padding: 15
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.dataset.label === '回撤') {
                                        label += context.parsed.y.toFixed(2) + '%';
                                    } else {
                                        label += context.parsed.y.toFixed(2);
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#2a2a4a' },
                            ticks: { color: '#8892b0', maxTicksLimit: 10 }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            grid: { color: '#2a2a4a' },
                            ticks: { color: '#64ffda' },
                            title: {
                                display: true,
                                text: '资金',
                                color: '#64ffda'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            grid: {
                                drawOnChartArea: false,
                            },
                            ticks: { 
                                color: '#ff6b6b',
                                callback: function(value) {
                                    return value.toFixed(1) + '%';
                                }
                            },
                            title: {
                                display: true,
                                text: '回撤',
                                color: '#ff6b6b'
                            }
                        }
                    }
                }
            });
            
            charts.daily = new Chart(document.getElementById('dailyChart'), {
                type: 'bar',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '日收益',
                        data: dailyReturn,
                        backgroundColor: dailyReturn.map(v => v >= 0 ? 'rgba(100, 255, 218, 0.6)' : 'rgba(255, 107, 107, 0.6)'),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#8892b0',
                                usePointStyle: true,
                                padding: 15
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '日收益: ' + context.parsed.y.toFixed(2) + '%';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#2a2a4a' },
                            ticks: { color: '#8892b0', maxTicksLimit: 10 }
                        },
                        y: {
                            grid: { color: '#2a2a4a' },
                            ticks: { 
                                color: '#8892b0',
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        }
                    },
                    barPercentage: 1,
                    categoryPercentage: 1
                }
            });
        }

        function renderTrades(trades) {
            const tbody = document.querySelector('#tradesTable tbody');
            
            if (!trades || trades.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #6a6a8a;">暂无交易记录</td></tr>';
                return;
            }
            
            tbody.innerHTML = trades.map(t => {
                const returnValue = parseFloat(t.return) || 0;
                const isLong = t.direction === 'Buy';
                return `
                    <tr>
                        <td>${escapeHtml(t.open_date)}</td>
                        <td>${escapeHtml(t.close_date)}</td>
                        <td>${escapeHtml(t.symbol)}</td>
                        <td><span class="badge ${isLong ? 'badge-buy' : 'badge-sell'}">${isLong ? '多' : '空'}</span></td>
                        <td>${escapeHtml(formatPrice(t.open_price))}</td>
                        <td>${escapeHtml(formatPrice(t.close_price))}</td>
                        <td>${escapeHtml(t.leverage || '-')}</td>
                        <td style="color: ${returnValue > 0 ? '#64ffda' : '#ff6b6b'}">${escapeHtml(formatPercent(returnValue))}</td>
                    </tr>
                `;
            }).join('');
        }

        function formatPercent(value) {
            if (value === null || value === undefined) return '-';
            return (value * 100).toFixed(2) + '%';
        }

        function formatPrice(value) {
            if (value === null || value === undefined) return '-';
            return Number(value).toFixed(2);
        }

        function showMessage(msg, type) {
            const div = document.getElementById('message');
            div.innerHTML = `<div class="${type}">${msg}</div>`;
            setTimeout(() => div.innerHTML = '', 5000);
        }

        document.getElementById('backtestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const symbol = document.getElementById('symbol').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const strategy = document.getElementById('strategy').value;
            
            if (!symbol) {
                showMessage('请选择品种', 'error');
                return;
            }
            
            const dateValidation = validateDates(startDate, endDate);
            if (!dateValidation.valid) {
                showMessage(dateValidation.error, 'error');
                return;
            }
            
            const params = {};
            if (window.strategiesConfig) {
                const strategyConfig = window.strategiesConfig.find(s => s.name === strategy);
                if (strategyConfig && strategyConfig.params) {
                    strategyConfig.params.forEach(p => {
                        const input = document.getElementById('param_' + p.name);
                        if (input) {
                            params[p.name] = parseFloat(input.value);
                        }
                    });
                }
            }
            
            const paramsValidation = validateParams(strategy, params);
            if (!paramsValidation.valid) {
                showMessage(paramsValidation.errors.join('; '), 'error');
                return;
            }
            
            const btn = document.getElementById('runBtn');
            btn.disabled = true;
            btn.textContent = '运行中...';
            document.getElementById('message').innerHTML = '<div class="loading">正在执行回测</div>';
            
            try {
                const response = await fetch('/api/backtest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbol,
                        start_date: startDate.replace(/-/g, ''),
                        end_date: endDate.replace(/-/g, ''),
                        strategy,
                        params: paramsValidation.params
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showMessage('回测完成', 'success');
                    loadResults();
                    viewResult(result.id);
                } else {
                    showMessage(result.error || '回测失败', 'error');
                }
            } catch (err) {
                showMessage('请求失败: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '运行回测';
            }
        });

        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(today.getDate() - 1);
        const oneYearAgo = new Date(yesterday);
        oneYearAgo.setFullYear(yesterday.getFullYear() - 1);
        
        document.getElementById('endDate').value = yesterday.toISOString().split('T')[0];
        document.getElementById('startDate').value = oneYearAgo.toISOString().split('T')[0];

        loadSymbols();
        loadStrategies();
        loadResults();
    </script>
</body>
</html>
